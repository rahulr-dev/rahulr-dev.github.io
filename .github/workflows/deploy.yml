name: Build and Deploy to GitHub Pages

on:
  # Allows external repos to trigger this build
  workflow_dispatch:
    inputs:
      trigger_source:
        description: "Triggered from"
        required: false
        default: "manual"
  # Also runs when you push directly to the Portfolio Repo
  push:
    branches: ["main"]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Portfolio Code
        uses: actions/checkout@v4
        # Crucially, this fetches the submodule's content!
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies and Build Next.js
        run: |
          npm install
          # The 'next build' step will read files from the synced submodule (content/posts)
          npm run build

      - name: Deploy to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # The folder created by 'next export' or 'output: export'
          publish_dir: ./out
          # Or the branch your Pages is configured to use
          publish_branch: gh-pages
